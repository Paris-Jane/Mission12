# Deploy Mission11.API to Azure App Service (Mission13 branch).
#
# ── Why not `az ad sp create-for-rbac`? ─────────────────────────────────────
# On many school tenants (e.g. BYU), students get:
#   "Insufficient privileges to complete the operation" / cannot register apps.
# That command needs Azure AD permission you may not have. This workflow uses
# a Publish Profile instead — no service principal required.
#
# ── GitHub secrets (Settings → Secrets and variables → Actions) ────────────
#   AZURE_WEBAPP_NAME
#       → Portal → your App Service → copy the app **name** (top of Overview).
#   AZURE_WEBAPP_PUBLISH_PROFILE
#       → Portal → same App Service → **Download publish profile** (top bar or
#         Deployment Center). Open the downloaded **.PublishSettings** file in a
#         text editor, select ALL (Cmd+A), copy, paste into this secret as one
#         block (XML). Do not trim; GitHub stores it as one secret value.
#


# If deploy still says "No credentials", the publish profile secret is usually
# empty, wrong file, or truncated — re-download and paste the full XML again.
# ────────────────────────────────────────────────────────────────────────────
name: Deploy API to Azure (Mission13)

on:
  push:
    branches:
      - Mission13
    paths:
      - "Mission11/backend/**"
      - ".github/workflows/azure-webapp-api-mission13.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish Mission11/backend/Mission11.API/Mission11.API.csproj -c Release -o ./publish

      - name: Check Azure Web App secrets look present
        shell: bash
        env:
          PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          APP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          plen=${#PROFILE}
          nlen=${#APP_NAME}
          if [ "$nlen" -lt 1 ]; then
            echo "::error::AZURE_WEBAPP_NAME is missing. In Azure Portal open your App Service → Overview → copy the **Name** into this secret."
            exit 1
          fi
          if [ "$plen" -lt 200 ]; then
            echo "::error::AZURE_WEBAPP_PUBLISH_PROFILE is missing or too short ($plen chars). In Azure Portal open your App Service → **Download publish profile** → open the .PublishSettings file → copy the entire XML into this secret."
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
