# Deploy Mission11.API to Azure App Service on pushes to Mission13.
# Add these repository secrets (GitHub → Settings → Secrets → Actions):
#   AZURE_WEBAPP_NAME          — App Service name (e.g. mission13backend2-hnhpf9bmdvf7c0hf)
#   AZURE_WEBAPP_PUBLISH_PROFILE — full XML from Azure Portal → App → Download publish profile
name: Deploy API to Azure (Mission13)

on:
  push:
    branches:
      - Mission13
    paths:
      - "Mission11/backend/**"
      - ".github/workflows/azure-webapp-api-mission13.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish Mission11/backend/Mission11.API/Mission11.API.csproj -c Release -o ./publish

      # v2 supports publish-profile alone; v3 often requires azure/login first.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
